    <linearGradient id="metal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#142235"/>
      <stop offset="0.52" stop-color="#08111f"/>
      <stop offset="1" stop-color="#02050c"/>
