<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f2ea" />
  <meta name="description" content="A calm mobile Store Pilot for running a retail shift." />
  <title>Store Pilot</title>
  <link rel="stylesheet" href="./css/style.css?v=store-pilot-reset-4" />
</head>
<body>
  <main class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">CASEY'S STORE PILOT</p>
        <h1>Today’s Shift</h1>
      </div>
      <div class="status-pill" id="system-status">Ready</div>
    </header>

    <section class="hero-card" aria-live="polite">
      <div class="hero-meta">
        <span id="shift-label">Opening</span>
        <span id="date-label">Today</span>
      </div>
      <p class="eyebrow">NEXT BEST ACTION</p>
      <h2 id="next-title">Loading shift plan...</h2>
      <p id="next-copy">Finding the cleanest next move so your brain does not have to juggle knives.</p>
      <div class="hero-actions">
        <button class="primary-action" id="complete-next" type="button">Mark Done</button>
        <button class="secondary-action" id="open-report" type="button">Report Issue</button>
      </div>
    </section>

    <section class="progress-card">
      <div class="progress-header">
        <span>Shift Progress</span>
        <strong id="progress-text">0%</strong>
      </div>
      <div class="progress-track"><div id="progress-fill"></div></div>
      <p id="progress-subtext">Start with the one task that matters most.</p>
    </section>

    <section class="screen-card" id="screen-card">
      <div class="screen-header">
        <div>
          <p class="eyebrow" id="screen-eyebrow">COMMAND</p>
          <h2 id="screen-title">Next</h2>
        </div>
        <button class="text-button" id="copy-output" type="button" hidden>Copy</button>
      </div>
      <div id="screen-content" class="screen-content"></div>
    </section>

    <nav class="bottom-nav" aria-label="Store Pilot navigation">
      <button class="nav-button active" type="button" data-screen="next">Next</button>
      <button class="nav-button" type="button" data-screen="tasks">Tasks</button>
      <button class="nav-button" type="button" data-screen="report">Report</button>
      <button class="nav-button" type="button" data-screen="log">Log</button>
      <button class="nav-button primary" type="button" data-screen="voice">Voice</button>
    </nav>
  </main>

  <script type="module" src="./js/main.js?v=store-pilot-reset-4"></script>
</body>
</html>
