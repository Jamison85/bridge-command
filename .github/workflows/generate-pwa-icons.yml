name: Generate PWA icons

on:
  push:
    branches:
      - agent/pwa-accessibility-v29
    paths:
      - "icons/*.svg"
      - "scripts/generate-pwa-icons.mjs"
      - ".github/workflows/generate-pwa-icons.yml"

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pwa-accessibility-v29
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install icon renderer
        run: npm install --no-save --ignore-scripts=false sharp@0.33.5
      - name: Generate icons
        run: node scripts/generate-pwa-icons.mjs
      - name: Commit generated PNG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add icons/store-pilot-192.png icons/store-pilot-512.png icons/store-pilot-apple-180.png icons/store-pilot-maskable-512.png
          if git diff --cached --quiet; then
            echo "Icon files are already current."
            exit 0
          fi
          git commit -m "Generate PWA PNG icons"
          git push origin HEAD:agent/pwa-accessibility-v29
